apiVersion: v2
name: n8n
description: A Helm chart for fair-code workflow automation platform with native AI capabilities. Combine visual building with custom code, self-host or cloud, 400+ integrations.
icon: https://avatars1.githubusercontent.com/u/45487711?s=200&v=4
# A chart can be either an 'application' or a 'library' chart.
#
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
#
# Library charts provide useful utilities or functions for the chart developer. They're included as
# a dependency of application charts to inject those utilities and functions into the rendering
# pipeline. Library charts do not define any templates and therefore cannot be deployed.
type: application
# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 1.24.7
# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
appVersion: "2.28.7"
kubeVersion: ">=1.23.0-0"
home: https://n8n.io
maintainers:
  - name: burakince
    email: burak.ince@linux.org.tr
    url: https://www.burakince.com
sources:
  - https://github.com/community-charts/helm-charts
  - https://github.com/n8n-io/n8n
keywords:
  - n8n
  - Workflow Automation
  - Workflow
  - Automation
  - iPaaS
  - integration-framework
  - low-code-plattform
  - low-code
annotations:
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/community-charts/helm-charts
    - name: Chart Usage Page
      url: https://community-charts.github.io/docs/charts/n8n/usage
    - name: Upstream Project
      url: https://github.com/n8n-io/n8n
    - name: Official Documentation
      url: https://docs.n8n.io/
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/changes: |-
    - kind: added
      description: Add image.registry value (default docker.io) for CRI-O compatibility and custom registry support
    - kind: added
      description: Add initContainers.waitForMain.image values for configurable wait-for-main busybox init container image
    - kind: changed
      description: Render main n8n container image with explicit registry prefix (docker.io/n8nio/n8n by default)
    - kind: changed
      description: Render wait-for-main init container image from values instead of hardcoded busybox:1.36
  artifacthub.io/images: |
    - name: n8n
      image: n8nio/n8n:2.28.7
      platforms:
        - linux/amd64
        - linux/arm64
    - name: n8n-runners
      image: n8nio/runners:2.28.7
      platforms:
        - linux/amd64
        - linux/arm64
  artifacthub.io/license: Apache-2.0
  artifacthub.io/maintainers: |
    - name: burakince
      email: burak.ince@linux.org.tr
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/screenshots: |-
    []
  artifacthub.io/signKey: |
    fingerprint: 939B1A0ED8AAA8E722ACCDB3B6A012EE8A76426A
    url: https://keybase.io/communitycharts/pgp_keys.asc
dependencies:
  - name: redis
    version: 27.0.13
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: postgresql
    version: 18.7.11
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: minio
    version: 5.4.0
    repository: https://charts.min.io/
    condition: minio.enabled
