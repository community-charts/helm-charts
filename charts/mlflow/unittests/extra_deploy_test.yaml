suite: test extra deploy

release:
  name: mlflow
  namespace: mlflow

chart:
  version: 1.0.0
  appVersion: 1.0.0

tests:
  - it: should render no extra objects when extraDeploy is empty
    templates:
      - extra-list.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a plain extra object from extraDeploy
    templates:
      - extra-list.yaml
    set:
      extraDeploy:
        - apiVersion: v1
          kind: Secret
          metadata:
            name: my-extra-secret
          stringData:
            key: value
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: my-extra-secret

  - it: should render multiple extra objects from extraDeploy
    templates:
      - extra-list.yaml
    set:
      extraDeploy:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: extra-cm
          data:
            foo: bar
        - apiVersion: v1
          kind: Secret
          metadata:
            name: extra-secret
          stringData:
            token: abc123
    asserts:
      - hasDocuments:
          count: 2

  - it: should support tpl rendering in extraDeploy objects
    templates:
      - extra-list.yaml
    set:
      extraDeploy:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: '{{ include "mlflow.fullname" . }}-extra'
          data:
            release: '{{ .Release.Name }}'
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: mlflow-extra
      - equal:
          path: data.release
          value: mlflow
