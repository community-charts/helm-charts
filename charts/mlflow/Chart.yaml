apiVersion: v2
name: mlflow
description: A Helm chart for Mlflow open source platform for the machine learning lifecycle
icon: https://raw.githubusercontent.com/mlflow/mlflow/master/assets/logo.svg
# A chart can be either an 'application' or a 'library' chart.
#
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
#
# Library charts provide useful utilities or functions for the chart developer. They're included as
# a dependency of application charts to inject those utilities and functions into the rendering
# pipeline. Library charts do not define any templates and therefore cannot be deployed.
type: application
# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 1.10.0
# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
appVersion: "3.14.0"
kubeVersion: ">=1.16.0-0"
home: https://mlflow.org
maintainers:
  - name: burakince
    email: burak.ince@linux.org.tr
    url: https://www.burakince.com
sources:
  - https://github.com/community-charts/helm-charts
  - https://github.com/burakince/mlflow
  - https://github.com/mlflow/mlflow
keywords:
  - docker
  - machine-learning
  - ai
  - ml
  - model-management
  - mlflow
  - mlflow-tracking-server
  - mlflow-docker
  - mlflow-tracking
  - mlflow-kube
annotations:
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/community-charts/helm-charts
    - name: Chart Usage Page
      url: https://community-charts.github.io/docs/charts/mlflow/usage
    - name: Upstream Project
      url: https://github.com/burakince/mlflow
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/changes: |-
    - kind: added
      description: Add optional image digest support for immutable image pulls
    - kind: added
      description: Add optional MinIO subchart for S3-compatible artifact storage without external dependencies
    - kind: added
      description: Add uvicorn-opts support with log-level merging; uvicorn is now the default server for log injection instead of gunicorn
      links:
        - name: GitHub Issue
          url: https://github.com/community-charts/helm-charts/issues/223
        - name: GitHub Issue
          url: https://github.com/community-charts/helm-charts/issues/310
        - name: GitHub Issue
          url: https://github.com/community-charts/helm-charts/issues/411
    - kind: security
      description: Enable readOnlyRootFilesystem and add built-in tmp emptyDir volume to harden container filesystem
    - kind: fixed
      description: Default keyOfAccessKeyId and keyOfSecretAccessKey to standard AWS key names so existingSecret works when only name is provided
      links:
        - name: GitHub Issue
          url: https://github.com/community-charts/helm-charts/issues/225
    - kind: security
      description: Automatically inject MLFLOW_SERVER_ALLOWED_HOSTS from ingress hosts to prevent DNS rebinding attacks
      links:
        - name: GitHub Issue
          url: https://github.com/community-charts/helm-charts/issues/285
    - kind: changed
      description: Document azure-identity requirement for AKS Managed Identity; workaround is AZURE_STORAGE_CONNECTION_STRING via extraEnvVars
      links:
        - name: GitHub Issue
          url: https://github.com/community-charts/helm-charts/issues/423
    - kind: security
      description: Automatically inject MLFLOW_SERVER_CORS_ALLOWED_ORIGINS from ingress hosts (https when TLS configured, http otherwise) to prevent CORS-based cross-origin attacks
    - kind: added
      description: Add serverAllowedHosts and corsAllowedOrigins list values that append to ingress auto-detected entries; duplicates are removed and a lone wildcard entry collapses the list to just *
    - kind: fixed
      description: Auto-configure auth PostgreSQL backend from the Bitnami postgresql subchart when postgresql.enabled is true and auth.enabled is true, fixing missing database_uri templating reported in v0.7.4
      links:
        - name: GitHub Issue
          url: https://github.com/community-charts/helm-charts/issues/504
    - kind: added
      description: Add serverHost value to make the MLflow server network interface binding configurable; defaults to 0.0.0.0 and can be set to 127.0.0.1 for sidecar proxy deployments
      links:
        - name: GitHub Issue
          url: https://github.com/community-charts/helm-charts/issues/230
  artifacthub.io/images: |
    - name: mlflow
      image: burakince/mlflow:3.14.0
  artifacthub.io/license: MIT
  artifacthub.io/maintainers: |
    - name: burakince
      email: burak.ince@linux.org.tr
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "false"
  artifacthub.io/screenshots: |-
    - title: Quickstart UI screenshot
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/quickstart/quickstart_ui_screenshot.png
    - title: OSS registry 1 register
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/oss_registry_1_register.png
    - title: OSS Registry 2 dialog
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/oss_registry_2_dialog.png
    - title: OSS Registry 3 overview
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/oss_registry_3_overview.png
    - title: OSS Registry 3b version
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/oss_registry_3b_version.png
    - title: OSS Registry 4 version
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/oss_registry_4_model.png
    - title: OSS Registry 4b version
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/oss_registry_4b_model_alias.png
    - title: OSS Registry 5 transition
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/oss_registry_5_version.png
    - title: OSS Registry 6 transition
      url: https://raw.githubusercontent.com/mlflow/mlflow/refs/heads/master/docs/static/images/oss_registry_6_version.png
  artifacthub.io/signKey: |
    fingerprint: 939B1A0ED8AAA8E722ACCDB3B6A012EE8A76426A
    url: https://keybase.io/communitycharts/pgp_keys.asc
dependencies:
  - name: postgresql
    version: 18.7.5
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: mysql
    version: 14.0.3
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
  - name: minio
    version: 5.4.0
    repository: https://charts.min.io/
    condition: minio.enabled
